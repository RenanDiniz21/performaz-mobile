name: performaz
description: "Performaz — Gamified sales management for food distribution"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Networking
  dio: ^5.8.0+1

  # Local database (offline)
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5

  # Dependency injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Design
  google_fonts: ^6.2.1

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Connectivity
  connectivity_plus: ^6.1.4

  # Location
  geolocator: ^13.0.2

  # Image picker
  image_picker: ^1.1.2

  # Firebase messaging
  firebase_messaging: ^15.2.5
  firebase_core: ^3.12.1

  # Background tasks
  workmanager: ^0.9.0+3

  # Charts
  fl_chart: ^0.70.2

  # CSV & file sharing
  csv: ^6.0.0
  file_picker: ^8.0.0
  share_plus: ^10.0.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Image caching
  cached_network_image: ^3.4.1

  # Utils
  logger: ^2.5.0
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^2.7.0
  build_runner: ^2.4.14
  drift_dev: ^2.25.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
